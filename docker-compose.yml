version: "3.9"

services:
  letter-api:
    build: .
    image: letter-recognition-api:latest
    container_name: letter-cnn-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=model/letter_cnn.pth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
